name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, feature/*]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-xdist

      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short -x

      - name: Run performance benchmarks
        run: |
          pytest tests/test_performance.py -v --tb=short -k "throughput or latency"

      - name: Generate coverage report
        run: |
          pytest tests/ --cov=api --cov=memory --cov=orchestrator --cov-report=xml --cov-report=html

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy

      - name: Check code formatting with black
        run: black --check api/ memory/ orchestrator/ sdk/ tests/ || true

      - name: Check import sorting with isort
        run: isort --check-only api/ memory/ orchestrator/ sdk/ tests/ || true

      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 api/ memory/ orchestrator/ sdk/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings
          flake8 api/ memory/ orchestrator/ sdk/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Type check with mypy
        run: |
          mypy api/ memory/ orchestrator/ sdk/ --ignore-missing-imports || true

  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Run Bandit security scan
        run: |
          bandit -r api/ memory/ orchestrator/ sdk/ -f json -o bandit-report.json || true
          bandit -r api/ memory/ orchestrator/ sdk/

      - name: Check dependencies for known vulnerabilities
        run: |
          safety check --json || true

  integration-tests:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Start API service
        run: |
          python -m uvicorn api.main:app --host 0.0.0.0 --port 8000 &
          sleep 5

      - name: Run integration tests
        run: |
          pytest tests/test_integration.py -v --tb=short || true

      - name: Test API health endpoint
        run: |
          curl -f http://localhost:8000/v1/health || exit 1

  performance-profile:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest memory-profiler

      - name: Run performance profile
        run: |
          pytest tests/test_performance.py -v --tb=short -k "throughput" -s

      - name: Upload performance results
        uses: actions/upload-artifact@v3
        with:
          name: performance-reports
          path: performance-*.json

  build-sdk:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build Python package
        run: |
          cd sdk && python -m build

      - name: Check package with twine
        run: |
          cd sdk && twine check dist/*

  docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install sphinx sphinx-rtd-theme

      - name: Generate API documentation
        run: |
          mkdir -p docs/api
          python -c "from api.main import app; import json; print(json.dumps(app.openapi(), indent=2))" > docs/api/openapi.json

      - name: Upload documentation
        uses: actions/upload-artifact@v3
        with:
          name: api-docs
          path: docs/api

  notify:
    runs-on: ubuntu-latest
    needs: [test, lint, security]
    if: always()

    steps:
      - name: Check Pipeline Status
        run: |
          if [ "${{ needs.test.result }}" == "success" ] && [ "${{ needs.lint.result }}" == "success" ] && [ "${{ needs.security.result }}" == "success" ]; then
            echo "✅ All checks passed!"
          else
            echo "❌ Some checks failed"
            exit 1
          fi
